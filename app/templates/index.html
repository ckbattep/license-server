<!-- app/templates/index.html -->
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>🔐 License Server — Web UI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card-header { background-color: #0d6efd; color: white; }
        .signature-box { font-family: monospace; font-size: 12px; max-height: 150px; overflow-y: auto; }
    </style>
</head>
<body class="p-4">
<div class="container">

    <!-- Header -->
    <div class="text-center mb-4">
        <h1>🔐 License Server — Web UI v1.0</h1>
        <p class="text-muted">Проверка и генерация лицензий (Ed25519)</p>
    </div>

    <!-- Section 1: Verify -->
    <div class="card mb-4">
        <div class="card-header">🔍 Проверка подписи</div>
        <div class="card-body">
            <form id="verifyForm" onsubmit="return false;">
                <div class="mb-3">
                    <label for="licenseJson" class="form-label">License JSON (копируй из .json)</label>
                    <textarea id="licenseJson" class="form-control" rows="6"
                              placeholder='{"id": "LIC-2026-03-21-001", ...}'></textarea>
                </div>
                <div class="mb-3">
                    <label for="signature" class="form-label">Signature (копируй из .sig)</label>
                    <input type="text" id="signature" class="form-control"
                           placeholder="MEYCIQD..." />
                </div>
                <button type="button" onclick="verifyLicense()" class="btn btn-primary">
                    ✅ Проверить
                </button>
            </form>

            <div id="verifyResult" class="mt-3"></div>
        </div>
    </div>

    <!-- Section 2: Generate -->
    <div class="card mb-4">
        <div class="card-header">🔑 Генерация новой лицензии</div>
        <div class="card-body">
            <form id="generateForm" onsubmit="return false;">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label for="user" class="form-label">User</label>
                        <input type="text" id="user" class="form-control" value="CitoLaw" />
                    </div>
                    <div class="col-md-6">
                        <label for="product" class="form-label">Product</label>
                        <input type="text" id="product" class="form-control" value="License Server v1.0" />
                    </div>
                </div>
                <div class="mb-3 mt-3">
                    <label for="features" class="form-label">Features (через запятую)</label>
                    <input type="text" id="features" class="form-control"
                           value="api, web, cli" />
                </div>
                <button type="button" onclick="generateLicense()" class="btn btn-success">
                    🚀 Генерировать
                </button>
            </form>

            <div id="generateResult" class="mt-3"></div>
        </div>
    </div>

    <!-- Section 3: List -->
    <div class="card mb-4">
        <div class="card-header">📋 Список лицензий</div>
        <div class="card-body">
            <button type="button" onclick="listLicenses()" class="btn btn-info">
                📂 Загрузить
            </button>

            <table id="licensesTable" class="table table-striped mt-3 d-none">
                <thead><tr>
                    <th>ID</th>
                    <th>User</th>
                    <th>Product</th>
                    <th>Expires</th>
                    <th>Features</th>
                </tr></thead>
                <tbody></tbody>
            </table>

            <div id="listResult" class="mt-3"></div>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
// API URL
const API_URL = "http://127.0.0.1:8080/api";

function verifyLicense() {
    const jsonStr = document.getElementById('licenseJson').value.trim();
    const sig     = document.getElementById('signature').value.trim();

    if (!jsonStr || !sig) {
        alert("⚠️ Заполните JSON и подпись!");
        return;
    }

    try {
        const payload = JSON.parse(jsonStr);
        fetch(`${API_URL}/verify`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({payload, signature: sig})
        })
        .then(r => r.json())
        .then(data => {
            const div = document.getElementById('verifyResult');
            if (data.valid) {
                div.innerHTML = `<div class="alert alert-success">✅ Подпись валидна!</div>`;
            } else {
                div.innerHTML = `<div class="alert alert-danger">❌ Подпись НЕВАЛИДНА!</div>`;
            }
        })
        .catch(e => {
            document.getElementById('verifyResult').innerHTML =
                `<div class="alert alert-warning">⚠️ Ошибка: ${e.message}</div>`;
        });
    } catch (e) {
        alert("⚠️ JSON не распарсился!");
    }
}

function generateLicense() {
    const user     = document.getElementById('user').value.trim();
    const product  = document.getElementById('product').value.trim();
    const features = document.getElementById('features').value.split(',').map(s => s.trim());

    fetch(`${API_URL}/generate`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({user, product, features})
    })
    .then(r => r.json())
    .then(data => {
        const div = document.getElementById('generateResult');
        div.innerHTML = `
            <div class="alert alert-success">
                ✅ Лицензия создана!<br>
                ID: <strong>${data.id}</strong><br>
                Signature: <code class="signature-box">${data.signature}</code>
            </div>`;
    })
    .catch(e => {
        document.getElementById('generateResult').innerHTML =
            `<div class="alert alert-warning">⚠️ Ошибка: ${e.message}</div>`;
    });
}

function listLicenses() {
    fetch(`${API_URL}/list`)
        .then(r => r.json())
        .then(data => {
            const table = document.getElementById('licensesTable');
            const tbody = table.querySelector('tbody');
            tbody.innerHTML = '';

            data.licenses.forEach(l => {
                const row = `<tr>
                    <td>${l.id}</td>
                    <td>${l.user}</td>
                    <td>${l.product}</td>
                    <td>${l.expires}</td>
                    <td>${l.features.join(', ')}</td>
                </tr>`;
                tbody.innerHTML += row;
            });

            table.classList.remove('d-none');
        })
        .catch(e => {
            document.getElementById('listResult').innerHTML =
                `<div class="alert alert-warning">⚠️ Ошибка: ${e.message}</div>`;
        });
}
</script>
</body>
</html>
